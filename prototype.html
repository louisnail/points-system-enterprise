/* ==================== SHARED: Field Management Drawer (增删改查) ==================== */
function FieldManageDrawer({ open, onClose, fields, title, onSave }) {
  const [items, setItems] = useState(fields || []);
  const [addOpen, setAddOpen] = useState(false);
  const [editItem, setEditItem] = useState(null);
  const [newLabel, setNewLabel] = useState('');
  const [newType, setNewType] = useState('text');
  useEffect(() => { if(open) setItems(fields || []); }, [open, fields]);
  const moveUp = i => { if(i===0) return; const a=[...items]; [a[i-1],a[i]]=[a[i],a[i-1]]; setItems(a); };
  const moveDown = i => { if(i===items.length-1) return; const a=[...items]; [a[i],a[i+1]]=[a[i+1],a[i]]; setItems(a); };
  const toggle = i => { const a=[...items]; a[i]={...a[i],visible:!a[i].visible}; setItems(a); };
  const removeField = i => { const a=[...items]; a.splice(i,1); setItems(a); message.success('字段已删除'); };
  const handleAdd = () => {
    if(!newLabel.trim()){ message.error('请输入字段名称'); return; }
    if(items.some(f=>f.label===newLabel.trim())){ message.error('字段名称已存在'); return; }
    setItems([...items, { key:'custom_'+Date.now(), label:newLabel.trim(), visible:true, custom:true, fieldType:newType }]);
    setNewLabel(''); setNewType('text'); setAddOpen(false);
    message.success('字段已添加');
  };
  const handleEditSave = () => {
    if(!newLabel.trim()){ message.error('请输入字段名称'); return; }
    const a=[...items]; a[editItem.index]={...a[editItem.index], label:newLabel.trim()}; setItems(a);
    setEditItem(null); setNewLabel('');
    message.success('字段已修改');
  };
  const startEdit = (f,i) => { setEditItem({...f, index:i}); setNewLabel(f.label); };
  return (
    <Drawer title={title||'字段管理'} width={460} open={open} onClose={onClose}
      extra={<Space>
        <Button icon={I('PlusOutlined')} onClick={()=>{setNewLabel('');setNewType('text');setAddOpen(true);}}>新增字段</Button>
        <Button type="primary" onClick={()=>{message.success('字段配置已保存'); if(onSave) onSave(items); onClose();}}>保存</Button>
      </Space>}>
      <Alert message="支持新增自定义字段、删除非必选字段、调整顺序和显隐" type="info" showIcon style={{marginBottom:16}} />
      <div style={{marginBottom:8,display:'flex',justifyContent:'space-between',color:'#8c8c8c',fontSize:12,padding:'0 12px'}}>
        <span>字段名称</span><span>排序 / 显隐 / 操作</span>
      </div>
      {items.map((f,i)=>(
        <div key={f.key||i} className="field-manage-row" style={{background:f.custom?'#f6ffed':'transparent'}}>
          <Space>
            <span style={{width:20,textAlign:'center',color:'#8c8c8c',fontSize:12}}>{i+1}</span>
            <span style={{fontWeight:f.visible?600:400, color:f.visible?'#1a1a2e':'#bfbfbf'}}>{f.label}</span>
            {f.required && <Tag color="red" style={{fontSize:10}}>必选</Tag>}
            {f.custom && <Tag color="green" style={{fontSize:10}}>自定义</Tag>}
            {f.fieldType && f.custom && <Tag style={{fontSize:10}}>{f.fieldType==='text'?'文本':f.fieldType==='number'?'数字':f.fieldType==='select'?'下拉':f.fieldType==='date'?'日期':'文本'}</Tag>}
          </Space>
          <Space size={2}>
            <Button type="text" size="small" disabled={i===0} onClick={()=>moveUp(i)}>{I('UpOutlined')}</Button>
            <Button type="text" size="small" disabled={i===items.length-1} onClick={()=>moveDown(i)}>{I('DownOutlined')}</Button>
            <Switch size="small" checked={f.visible} disabled={f.required} onChange={()=>toggle(i)} />
            <Tooltip title="编辑字段名"><Button type="text" size="small" onClick={()=>startEdit(f,i)}>{I('EditOutlined')}</Button></Tooltip>
            {!f.required ? (
              <Popconfirm title="确认删除该字段？" onConfirm={()=>removeField(i)}>
                <Button type="text" size="small" danger>{I('DeleteOutlined')}</Button>
              </Popconfirm>
            ) : <Button type="text" size="small" disabled>{I('DeleteOutlined')}</Button>}
          </Space>
        </div>
      ))}
      {/* 新增字段弹窗 */}
      <Modal open={addOpen} title={<span>{I('PlusCircleOutlined',{marginRight:6})}新增自定义字段</span>} width={400}
        onCancel={()=>setAddOpen(false)} onOk={handleAdd} okText="添加">
        <Form layout="vertical" style={{marginTop:16}}>
          <Form.Item label="字段名称" required>
            <Input value={newLabel} onChange={e=>setNewLabel(e.target.value)} placeholder="如：毕业院校、紧急联系人" />
          </Form.Item>
          <Form.Item label="字段类型">
            <Select value={newType} onChange={setNewType}>
              <Option value="text">文本</Option>
              <Option value="number">数字</Option>
              <Option value="select">下拉选择</Option>
              <Option value="date">日期</Option>
            </Select>
          </Form.Item>
        </Form>
      </Modal>
      {/* 编辑字段弹窗 */}
      <Modal open={!!editItem} title={<span>{I('EditOutlined',{marginRight:6})}编辑字段</span>} width={400}
        onCancel={()=>setEditItem(null)} onOk={handleEditSave} okText="保存">
        <Form layout="vertical" style={{marginTop:16}}>
          <Form.Item label="字段名称" required>
            <Input value={newLabel} onChange={e=>setNewLabel(e.target.value)} />
          </Form.Item>
        </Form>
      </Modal>
    </Drawer>
  );
}

/* ==================== ECharts helper ==================== */
function EChart({ option, style }) {
  const ref = useRef(null);
  const chartRef = useRef(null);
  useEffect(() => {
    if (!ref.current) return;
    if (!chartRef.current) chartRef.current = echarts.init(ref.current);
    chartRef.current.setOption(option, true);
    const onResize = () => chartRef.current?.resize();
    window.addEventListener('resize', onResize);
    return () => { window.removeEventListener('resize', onResize); };
  }, [option]);
  return React.createElement('div', { ref, style: { width:'100%', height:'100%', ...style } });
}

/* ==================== DEPARTMENT MANAGEMENT (Enhanced v2.1) ==================== */
function DepartmentManagePage() {
  const [selectedKey, setSelectedKey] = useState(null);
  const [modalOpen, setModalOpen] = useState(false);
  const [modalMode, setModalMode] = useState('add'); // 'add' | 'edit' | 'addChild'
  const [modalForm, setModalForm] = useState({ name:'', parentId:null, level:2, sortOrder:0, managerId:null });
  const [managerModalOpen, setManagerModalOpen] = useState(false);
  const [deptFieldOpen, setDeptFieldOpen] = useState(false);

  const levelMap = {1:'集团',2:'事业部',3:'交付组'};
  const levelColors = {1:'#722ed1',2:'#1890ff',3:'#52c41a'};

  // Mock dept managers
  const [deptManagers, setDeptManagers] = useState({ 2:'000001', 5:'000003', 6:'000007' }); // deptId -> employeeNo

  const flatMap = {};
  const walk = (nodes) => nodes.forEach(n => { flatMap[n.id]=n; if(n.children) walk(n.children); });
  walk(MOCK_DEPTS);
  const selected = selectedKey ? flatMap[selectedKey] : null;

  const toTreeData = (nodes) => nodes.map(n => ({
    key: n.id, title: n.name, level: n.level, memberCount: n.memberCount || 0,
    children: n.children?.length ? toTreeData(n.children) : undefined,
  }));
  const treeData = toTreeData(MOCK_DEPTS);

  // Get employees for selected department
  const getDeptUsers = (deptName) => {
    if (!deptName) return [];
    return MOCK_USERS.filter(u => u.department === deptName || (deptName === '同盾集团'));
  };
  const deptUsers = selected ? getDeptUsers(selected.name) : [];
  const managerNo = selected ? deptManagers[selected.id] : null;
  const managerUser = managerNo ? MOCK_USERS.find(u => u.employeeNo === managerNo) : null;

  // Modal handlers
  const openAddModal = () => {
    setModalMode('add');
    setModalForm({ name:'', parentId:null, level:2, sortOrder:0, managerId:null });
    setModalOpen(true);
  };
  const openEditModal = () => {
    if (!selected) return;
    setModalMode('edit');
    setModalForm({ name:selected.name, parentId:null, level:selected.level, sortOrder:selected.id, managerId:deptManagers[selected.id]||null });
    setModalOpen(true);
  };
  const openAddChildModal = () => {
    if (!selected) return;
    setModalMode('addChild');
    setModalForm({ name:'', parentId:selected.id, level:Math.min(selected.level+1,3), sortOrder:0, managerId:null });
    setModalOpen(true);
  };
  const handleModalSave = () => {
    if (!modalForm.name.trim()) { message.error('请输入部门名称'); return; }
    const verb = modalMode==='edit' ? '编辑' : '新增';
    message.success(`${verb}部门「${modalForm.name}」成功`);
    setModalOpen(false);
  };
  const handleSetManager = (empNo) => {
    if (!selected) return;
    setDeptManagers(prev => ({...prev, [selected.id]: empNo}));
    const emp = MOCK_USERS.find(u => u.employeeNo === empNo);
    message.success(`已设置 ${emp?.name} 为「${selected.name}」部门主管`);
    setManagerModalOpen(false);
  };

  // Dept employee local state for status changes
  const [deptUserOverrides, setDeptUserOverrides] = useState({});
  const getDeptUsersWithState = () => deptUsers.map(u => ({...u, status: deptUserOverrides[u.id] !== undefined ? deptUserOverrides[u.id] : u.status}));
  const changeDeptUserStatus = (id, newStatus, label) => {
    setDeptUserOverrides(prev => ({...prev, [id]: newStatus}));
    const user = MOCK_USERS.find(u=>u.id===id);
    message.success(<span><strong>{user?.name}</strong> 已{label}{newStatus===2 ? ' — 不再参与积分排名' : newStatus===1 ? ' — 已恢复参与积分排名' : ''}</span>);
  };

  const deptEmployeeFields = [
    { key:'employeeNo', label:'工号', visible:true, required:true },
    { key:'name', label:'姓名', visible:true, required:true },
    { key:'companyBelong', label:'归属组织', visible:true },
    { key:'position', label:'岗位', visible:true },
    { key:'rankLevel', label:'职级', visible:true },
    { key:'rankingList', label:'所属榜单', visible:true },
    { key:'totalPoints', label:'积分', visible:true },
    { key:'ranking', label:'排名', visible:true },
    { key:'status', label:'状态', visible:true },
    { key:'hireDate', label:'入职日期', visible:false },
    { key:'email', label:'邮箱', visible:false },
  ];

          <div className="card-box" style={{minHeight:600}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
              <Text strong>{I('ClusterOutlined',{marginRight:6})}组织架构</Text>
              <Button type="primary" size="small" icon={I('PlusOutlined')} onClick={openAddModal}>新增部门</Button>
            </div>
            <Tree
              showLine={{showLeafIcon:false}}
              blockNode
              defaultExpandAll
              selectedKeys={selectedKey?[selectedKey]:[]}
              onSelect={(keys)=>setSelectedKey(keys[0]||null)}
              treeData={treeData}
              titleRender={(node)=>(
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'4px 8px',borderRadius:6,
                  background:selectedKey===node.key?'#e6f7ff':'transparent',
                  borderLeft:selectedKey===node.key?'3px solid #1890ff':'3px solid transparent'}}>
                  <Space size={6}>
                    {I(node.level===1?'BankOutlined':node.level===2?'TeamOutlined':'UserOutlined',{color:levelColors[node.level]})}
                    <span style={{fontWeight:selectedKey===node.key?600:400}}>{node.title}</span>
                    <Tag color={levelColors[node.level]} style={{fontSize:10,lineHeight:'16px',padding:'0 4px'}}>{levelMap[node.level]}</Tag>
                  </Space>
                  <Badge count={node.memberCount} style={{background:levelColors[node.level]}} overflowCount={999} size="small" />

                    <Space>
                      <Avatar size="small" style={{background:'#1890ff'}}>{managerUser.name[0]}</Avatar>
                      <span style={{fontWeight:600}}>{managerUser.name}</span>

function AuditListPage() {
  const [selectedKeys, setSelectedKeys] = useState([]);
  const [rejectOpen, setRejectOpen] = useState(false);
  const [points, setPoints] = useState(MOCK_POINTS.map(p=>({...p})));
  const batchApprove = () => {
    setPoints(prev => prev.map(p => selectedKeys.includes(p.id) ? {...p, auditStatus:1} : p));
    message.success(`已批量通过 ${selectedKeys.length} 条记录`);
    setSelectedKeys([]);
  };
  const batchReject = () => {
    setRejectOpen('batch');
  };
  const singleApprove = (id) => {
    setPoints(prev => prev.map(p => p.id===id ? {...p, auditStatus:1} : p));
    message.success('已通过');
  };
  const singleReject = (id) => {
    setRejectOpen(id);
  };
  const confirmReject = () => {
    if (rejectOpen === 'batch') {
      setPoints(prev => prev.map(p => selectedKeys.includes(p.id) ? {...p, auditStatus:2} : p));
      message.success(`已批量驳回 ${selectedKeys.length} 条记录`);
      setSelectedKeys([]);
    } else {
      setPoints(prev => prev.map(p => p.id===rejectOpen ? {...p, auditStatus:2} : p));
      message.success('已驳回');
    }
    setRejectOpen(false);
  };
  const pendingCount = points.filter(p=>p.auditStatus===0).length;
  const passedCount = points.filter(p=>p.auditStatus===1).length;
  const rejectedCount = points.filter(p=>p.auditStatus===2).length;
  return (
    <div className="page-container">
      <div className="page-header"><h2>{I('AuditOutlined',{marginRight:8})}积分审核</h2></div>
      <Row gutter={12} style={{marginBottom:16}}>
        {[
          {label:'待审核',count:pendingCount,color:'#fa8c16'},
          {label:'已通过',count:passedCount,color:'#52c41a'},
          {label:'已驳回',count:rejectedCount,color:'#ff4d4f'},
        ].map(s=>(
          <Col span={8} key={s.label}>
            <div style={{background:'#fff',borderRadius:6,padding:'8px 16px',textAlign:'center',borderBottom:`3px solid ${s.color}`}}>
              <div style={{fontSize:20,fontWeight:700,color:s.color}}>{s.count}</div>
              <div style={{fontSize:11,color:'#8c8c8c'}}>{s.label}</div>
            </div>
          </Col>
        ))}
      </Row>
      <div className="card-box">
        <div className="filter-bar">
          <Select defaultValue={0} placeholder="审核状态" style={{width:130}} allowClear>
            <Option value={0}>待审核</Option><Option value={1}>已通过</Option><Option value={2}>已驳回</Option>
          </Select>
          <DatePicker picker="month" placeholder="归属月份" allowClear />
          <Select placeholder="积分状态" style={{width:120}} allowClear><Option value={1}>过程分</Option><Option value={2}>结果分</Option></Select>
          <Search placeholder="搜索员工" style={{width:200}} prefix={I('SearchOutlined')} />
        </div>
        <div className="table-actions">
          <Space>
            <Popconfirm title={`确认批量通过 ${selectedKeys.length} 条记录？`} onConfirm={batchApprove} disabled={!selectedKeys.length}>
              <Button type="primary" icon={I('CheckOutlined')} disabled={!selectedKeys.length}>批量通过 ({selectedKeys.length})</Button>
            </Popconfirm>
            <Button danger icon={I('CloseOutlined')} disabled={!selectedKeys.length} onClick={batchReject}>批量驳回 ({selectedKeys.length})</Button>
          </Space>
          <span style={{color:'#8c8c8c'}}>共 {points.length} 条</span>
        </div>
        <Table dataSource={points} rowKey="id" size="middle"
          rowSelection={{selectedRowKeys:selectedKeys, onChange:setSelectedKeys, getCheckboxProps:r=>({disabled:r.auditStatus!==0})}}
          columns={[
            { title:'员工', dataIndex:'user', width:70 },
            { title:'工号', dataIndex:'employeeNo', width:80 },
            { title:'指标', dataIndex:'indicator', width:140 },
            { title:'分类', dataIndex:'category', width:90 },
            { title:'分值', dataIndex:'score', width:70, render:v=><Tag color={v>0?'green':'red'}>{v>0?'+':''}{v}</Tag> },
            { title:'类型', dataIndex:'pointStatus', width:70, render:v=>v===1?'过程分':'结果分' },
            { title:'月份', dataIndex:'belongMonth', width:80 },
            { title:'录入人', dataIndex:'registrant', width:70 },
            { title:'审核', dataIndex:'auditStatus', width:80, render:v=><Tag color={AUDIT_COLORS[v]}>{AUDIT_MAP[v]}</Tag> },
            { title:'操作', width:140, fixed:'right', render:(_,r)=>(
              r.auditStatus===0 ? <Space size="small">
                <Popconfirm title="确认通过？" onConfirm={()=>singleApprove(r.id)}><a style={{color:'#52c41a'}}>{I('CheckOutlined')} 通过</a></Popconfirm>
                <a onClick={()=>singleReject(r.id)}>{I('CloseOutlined')} 驳回</a>
              </Space> : <span style={{color:'#8c8c8c'}}>-</span>
            )},
          ]}
        />
      </div>
      <Modal open={!!rejectOpen} title={<span>{I('CloseCircleOutlined',{marginRight:6})}驳回理由</span>} onCancel={()=>setRejectOpen(false)} onOk={confirmReject}>
        <TextArea rows={3} placeholder="请输入驳回理由..." style={{marginTop:16}} />
      </Modal>
    </div>
  );
}

          <Divider orientation="left">{I('CalculatorOutlined',{marginRight:4})} 积分设置</Divider>
          <Row gutter={16}>
            <Col span={8}><Form.Item label="积分小数位数"><InputNumber min={0} max={3} defaultValue={1} style={{width:'100%'}} /></Form.Item></Col>
            <Col span={8}><Form.Item label="小额免审阈值"><InputNumber min={0} defaultValue={0} style={{width:'100%'}} /></Form.Item></Col>
            <Col span={8}><Form.Item label="过程分自动存档"><Switch defaultChecked /></Form.Item></Col>
          </Row>
          <Divider orientation="left">{I('WarningOutlined',{marginRight:4})} 异常告警设置</Divider>
          <Row gutter={16}>
            <Col span={8}><Form.Item label="单人单月扣分阈值"><InputNumber min={1} defaultValue={30} style={{width:'100%'}} addonAfter="分" /></Form.Item></Col>
            <Col span={8}><Form.Item label="月度积分变化阈值"><InputNumber min={1} max={100} defaultValue={50} style={{width:'100%'}} addonAfter="%" /></Form.Item></Col>
            <Col span={8}><Form.Item label="审核超时天数"><InputNumber min={1} defaultValue={3} style={{width:'100%'}} addonAfter="天" /></Form.Item></Col>
          </Row>
          <Divider orientation="left">{I('AlertOutlined',{marginRight:4})} 末位预警设置</Divider>
          <Row gutter={16}>
            <Col span={8}><Form.Item label="末位百分比阈值"><InputNumber min={1} max={50} defaultValue={10} style={{width:'100%'}} addonAfter="%" /></Form.Item></Col>
            <Col span={8}><Form.Item label="连续低位触发高危月数"><InputNumber min={1} defaultValue={3} style={{width:'100%'}} addonAfter="月" /></Form.Item></Col>
          </Row>
          <Divider orientation="left">{I('FileTextOutlined',{marginRight:4})} 报表设置</Divider>
          <Row gutter={16}>
            <Col span={8}><Form.Item label="自动生成报表"><Switch /></Form.Item></Col>
            <Col span={8}><Form.Item label="生成周期"><Select defaultValue="monthly"><Option value="monthly">每月1号</Option><Option value="quarterly">每季度首月</Option></Select></Form.Item></Col>
          </Row>
          <Divider orientation="left">{I('InfoCircleOutlined',{marginRight:4})} 系统信息</Divider>
          <Row gutter={16}>
            <Col span={8}><Form.Item label="系统名称"><Input defaultValue="积分管理系统-企业版" /></Form.Item></Col>
            <Col span={8}><Form.Item label="系统Logo"><Input defaultValue="/logo.png" /></Form.Item></Col>
          </Row>
          <Form.Item><Button type="primary" icon={I('SaveOutlined')} onClick={()=>message.success('配置已保存')}>保存配置</Button></Form.Item>
        </Form>
      </div>
    </div>
  );
}

/* ==================== MAIN APP ==================== */
function App() {
  const [loggedIn, setLoggedIn] = useState(false);
  const [page, setPage] = useState('dashboard');
  const [collapsed, setCollapsed] = useState(false);
  const [openKeys, setOpenKeys] = useState(['personnel','indicator','point','ranking','system']);

  if (!loggedIn) return <LoginPage onLogin={()=>setLoggedIn(true)} />;

  const menuItems = [
    { key:'dashboard', icon:I('HomeOutlined'), label:'工作台' },
    { key:'cockpit', icon:I('DashboardOutlined'), label:'管理驾驶舱' },
    { key:'personnel', icon:I('TeamOutlined'), label:'人员管理', children:[
      { key:'user-current', icon:I('UserOutlined'), label:'员工管理' },
      { key:'user-history', icon:I('HistoryOutlined'), label:'历史员工' },
      { key:'department', icon:I('ApartmentOutlined'), label:'部门管理' },
    ]},
    { key:'ranking-list', icon:I('OrderedListOutlined'), label:'榜单配置' },
    { key:'indicator', icon:I('AppstoreOutlined'), label:'指标库管理', children:[
      { key:'indicator-category', icon:I('FolderOutlined'), label:'分类管理' },
      { key:'indicator-list', icon:I('UnorderedListOutlined'), label:'指标列表' },
    ]},
    { key:'point', icon:I('EditOutlined'), label:'积分管理', children:[
      { key:'point-entry', icon:I('ThunderboltOutlined'), label:'积分录入' },
      { key:'point-process', icon:I('SyncOutlined'), label:'过程分维护' },
      { key:'point-audit', icon:I('AuditOutlined'), label:'积分审核' },
    ]},
    { key:'ranking', icon:I('BarChartOutlined'), label:'排名展示', children:[
      { key:'ranking-monthly', icon:I('RiseOutlined'), label:'排名查看' },
      { key:'ranking-black', icon:I('FallOutlined'), label:'黑榜（倒数榜）' },
      { key:'ranking-quarter-star', icon:I('StarOutlined'), label:'季度之星' },
    ]},
    { key:'system', icon:I('SettingOutlined'), label:'系统管理', children:[
      { key:'system-role', icon:I('SafetyOutlined'), label:'角色管理' },
      { key:'system-config', icon:I('ToolOutlined'), label:'系统配置' },
    ]},
  ];

  const pageMap = {
    'dashboard': <DashboardPage />,
    'cockpit': <CockpitPage />,
    'user-current': <CurrentUserListPage />,
    'user-history': <HistoryUserListPage />,
    'department': <DepartmentManagePage />,
    'ranking-list': <RankingListManagePage />,
    'indicator-category': <CategoryManagePage />,
    'indicator-list': <IndicatorListPage />,
    'point-entry': <QuickEntryPage />,
    'point-process': <ProcessMaintainPage />,
    'point-audit': <AuditListPage />,
    'ranking-monthly': <MonthlyRankingPage />,
    'ranking-black': <BlackRankingPage />,
    'ranking-quarter-star': <QuarterStarPage />,
    'system-role': <RoleManagePage />,
    'system-config': <ConfigManagePage />,
  };

  return (
    <Layout style={{minHeight:'100vh'}}>
      <Sider collapsible collapsed={collapsed} onCollapse={setCollapsed} theme="dark" width={220}>
        <div style={{height:64,display:'flex',alignItems:'center',padding:'0 20px',gap:10,borderBottom:'1px solid rgba(255,255,255,.1)'}}>
          <div style={{width:32,height:32,background:'linear-gradient(135deg,#667eea,#764ba2)',borderRadius:6,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontWeight:700,fontSize:16,flexShrink:0}}>积</div>
          {!collapsed && <span style={{fontSize:16,fontWeight:700,color:'#fff',whiteSpace:'nowrap'}}>积分系统</span>}
        </div>
        <Menu theme="dark" mode="inline" selectedKeys={[page]} openKeys={openKeys} onOpenChange={setOpenKeys}
          onClick={({key})=>setPage(key)}
          items={menuItems.map(item=>({
            key:item.key, icon:item.icon, label:item.label,
            children: item.children?.map(c=>({ key:c.key, icon:c.icon, label:c.label }))
          }))}
        />
      </Sider>
      <Layout>
        <Header style={{background:'#fff',padding:'0 24px',display:'flex',alignItems:'center',justifyContent:'space-between',borderBottom:'1px solid #f0f0f0',height:64}}>
          <span style={{fontSize:15,color:'#595959'}}>{I('SafetyCertificateOutlined',{marginRight:6,color:'#667eea'})}积分管理系统-企业版 <Tag color="purple">v2.1</Tag></span>
          <Space>
            <span style={{color:'#595959'}}>{I('UserOutlined',{marginRight:4})}张明 (000001)</span>
            <Tag color="blue">super_admin</Tag>
            <Button type="link" danger icon={I('LogoutOutlined')} onClick={()=>setLoggedIn(false)}>退出</Button>
          </Space>
        </Header>
        <Content style={{background:'#f0f2f5',overflow:'auto'}}>
          {pageMap[page] || <DashboardPage />}
        </Content>
      </Layout>
    </Layout>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
