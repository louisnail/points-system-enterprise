    // ===== Department Manage =====
    function DepartmentManagePage() {
      const [selectedDept, setSelectedDept] = useState(null);
      const [formVisible, setFormVisible] = useState(false);
      const [form] = Form.useForm();

      const flatFind = (nodes, id) => {
        for (const n of nodes) {
          if (n.id === id) return n;
          if (n.children) { const f = flatFind(n.children, id); if (f) return f; }
        }
        return null;
      };

      const handleSelect = (keys) => {
        if (keys.length) setSelectedDept(flatFind(mockDeptTree, keys[0]));
      };

      const showForm = (record, parentId) => {
        form.resetFields();
        if (record) form.setFieldsValue(record);
        else if (parentId) form.setFieldsValue({parentId, level:3, sortOrder:0});
        else form.setFieldsValue({parentId:0, level:1, sortOrder:0});
        setFormVisible(true);
      };

      return (
        <div>
          <div className="page-header"><h2>部门管理</h2></div>
          <Row gutter={16}>
            <Col span={8}>
              <div className="dept-tree-panel">
                <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:16}}>
                  <strong>组织架构</strong>
                  <Button type="primary" size="small" icon={<PlusOutlined />} onClick={()=>showForm()}>新增</Button>
                </div>
                <Tree treeData={mockDeptTree} fieldNames={{title:'name', key:'id', children:'children'}} defaultExpandAll onSelect={handleSelect} />
              </div>
            </Col>
            <Col span={16}>
              {selectedDept ? (
                <div className="dept-detail-panel">
                  <Descriptions title="部门信息" column={2} bordered size="small">
                    <Descriptions.Item label="部门名称">{selectedDept.name}</Descriptions.Item>
                    <Descriptions.Item label="层级">{levelMap[selectedDept.level]}</Descriptions.Item>
                    <Descriptions.Item label="排序">{selectedDept.sortOrder}</Descriptions.Item>
                    <Descriptions.Item label="部门ID">{selectedDept.id}</Descriptions.Item>
                  </Descriptions>
                  <Space style={{marginTop:12}}>
                    <Button type="primary" size="small" icon={<EditOutlined />} onClick={()=>showForm(selectedDept)}>编辑</Button>
                    <Popconfirm title="确认删除该部门？" onConfirm={()=>{message.success('删除成功');setSelectedDept(null);}}><Button danger size="small" icon={<DeleteOutlined />}>删除</Button></Popconfirm>

    // ===== Quick Entry Page (积分录入) =====
    function QuickEntryPage() {
      const [activeTab, setActiveTab] = useState('quick');
      const [selectedCategoryId, setSelectedCategoryId] = useState(undefined);
      const [selectedIndicator, setSelectedIndicator] = useState(null);
      const [pendingList, setPendingList] = useState([]);
      const [previewVisible, setPreviewVisible] = useState(false);
      const [belongMonth, setBelongMonth] = useState(null);
      const [form] = Form.useForm();
      let _seqId = React.useRef(0);

      const filteredIndicators = useMemo(() => {
        if (!selectedCategoryId) return mockIndicators;
        const cat = mockCategories.find(c => c.id === selectedCategoryId);
        return cat ? mockIndicators.filter(i => i.categoryName === cat.name) : mockIndicators;
      }, [selectedCategoryId]);

      const onIndicatorChange = (val) => {
        const ind = mockIndicators.find(i => i.id === val);
        setSelectedIndicator(ind);
        if (ind && ind.scoreType === 1) {
          form.setFieldsValue({ confirmedScore: Math.abs(ind.fixedScore) });
        } else {
          form.setFieldsValue({ confirmedScore: undefined });
        }
      };

      const scoreHint = useMemo(() => {
        if (!selectedIndicator) return '请先选择指标';
        if (selectedIndicator.scoreType === 1) return `固定 ${Math.abs(selectedIndicator.fixedScore)} 分`;
        return `范围 ${selectedIndicator.minScore}~${selectedIndicator.maxScore}`;
      }, [selectedIndicator]);

      const isRangeType = selectedIndicator?.scoreType === 2;
      const isFixedType = selectedIndicator?.scoreType === 1;

      const handleAddToList = () => {
        form.validateFields().then(values => {
          if (!belongMonth) { message.warning('请先选择所属月份'); return; }
          const userId = values.userId;
          const user = mockUsers.find(u => u.id === userId);
          const ind = mockIndicators.find(i => i.id === values.indicatorId);
          if (!user || !ind) return;
          const score = values.confirmedScore * ind.direction;
          _seqId.current++;
          setPendingList(prev => [...prev, {
            _id: _seqId.current,
            userId, employeeName: user.name, employeeNo: user.employeeNo,
            indicatorId: ind.id, indicatorName: ind.name, categoryName: ind.categoryName,
            direction: ind.direction, confirmedScore: values.confirmedScore, score,
            pointStatus: ind.pointStatus, description: values.description || '',
          }]);
          form.setFieldsValue({ userId:undefined, indicatorId:undefined, confirmedScore:undefined, description:'' });
          setSelectedIndicator(null);
          setSelectedCategoryId(undefined);
          message.success(`已添加: ${user.name} - ${ind.name}`);
        }).catch(() => {});
      };

      const handleRemoveItem = (id) => setPendingList(prev => prev.filter(p => p._id !== id));

      const handleConfirmSubmit = () => {
        message.success(`提交成功，共 ${pendingList.length} 条积分记录已提交审核`);
        setPendingList([]);
        setPreviewVisible(false);
        setBelongMonth(null);
      };

      const pendingColumns = [
        { title:'#', width:40, render:(_,__,i)=>i+1 },
        { title:'工号', dataIndex:'employeeNo', width:80 },
        { title:'姓名', dataIndex:'employeeName', width:70 },
        { title:'指标', dataIndex:'indicatorName', ellipsis:true },
        { title:'分类', dataIndex:'categoryName', width:90 },
        { title:'确认分值', dataIndex:'confirmedScore', width:90 },
        { title:'实际得分', dataIndex:'score', width:90, render:(v) => <Tag color={v>0?'green':'red'}>{v>0?'+':''}{v}</Tag> },
        { title:'类型', dataIndex:'pointStatus', width:75, render:(v) => <Tag color={v===1?'blue':'purple'}>{v===1?'过程分':'结果分'}</Tag> },
        { title:'事由', dataIndex:'description', width:160, ellipsis:true, render:(v)=>v||'-' },
        { title:'操作', width:60, render:(_,r) => <a style={{color:'#ff4d4f'}} onClick={()=>handleRemoveItem(r._id)}><DeleteOutlined /></a> },
      ];

      const recentColumns = [
        { title:'员工', dataIndex:'employeeName', width:80 },
        { title:'指标', dataIndex:'indicatorName', ellipsis:true },
        { title:'分类', dataIndex:'categoryName', width:90 },
        { title:'分值', dataIndex:'score', width:70, render:(v) => <Tag color={v>0?'green':'red'}>{v>0?'+':''}{v}</Tag> },
        { title:'类型', dataIndex:'pointStatus', width:75, render:(v) => <Tag color={v===1?'blue':'purple'}>{v===1?'过程分':'结果分'}</Tag> },
        { title:'状态', dataIndex:'auditStatus', width:80, render:(v) => <Tag color={auditColorMap[v]}>{auditStatusMap[v]}</Tag> },
        { title:'时间', dataIndex:'createdAt', width:140 },
      ];

      const totalScore = useMemo(() => pendingList.reduce((s,r) => s + r.score, 0), [pendingList]);
      const uniqueUsers = useMemo(() => [...new Set(pendingList.map(r=>r.employeeName))], [pendingList]);

      return (
        <div>
          <div className="page-header"><h2>积分录入</h2></div>
          <div className="card-box">
            <Tabs activeKey={activeTab} onChange={setActiveTab} items={[
              { key:'quick', label:<span><FormOutlined style={{marginRight:4}} />快速录入</span>, children:(
                <div>
                  <div style={{background:'#f6f8fa', borderRadius:8, padding:'20px 20px 4px', marginBottom:16, border:'1px solid #e8e8e8'}}>
                    <Row gutter={16} align="top">
                      <Col span={6}>
                        <Form.Item label="所属月份" required style={{marginBottom:12}}>
                          <DatePicker picker="month" style={{width:'100%'}} value={belongMonth} onChange={setBelongMonth} placeholder="选择月份" />
                        </Form.Item>
                      </Col>
                      <Col span={18} style={{textAlign:'right', paddingTop:30}}>
                        <span style={{color:'#8c8c8c', fontSize:13}}>已添加 <span style={{color:'#1890ff', fontWeight:700, fontSize:16}}>{pendingList.length}</span> 条，涉及 <span style={{fontWeight:600}}>{uniqueUsers.length}</span> 人</span>
                      </Col>
                    </Row>
                  </div>
                  <Form form={form} layout="vertical">
                    <Row gutter={16}>
                      <Col span={8}>
                        <Form.Item label="员工" name="userId" rules={[{required:true,message:'请选择员工'}]}>
                          <Select placeholder="搜索工号/姓名" showSearch optionFilterProp="children" allowClear>
                            {mockUsers.filter(u=>u.status===1).map(u => <Option key={u.id} value={u.id}>{u.employeeNo} - {u.name}</Option>)}
                          </Select>
                        </Form.Item>
                      </Col>
                      <Col span={8}>
                        <Form.Item label="指标分类">
                          <Select value={selectedCategoryId} placeholder="全部分类" allowClear onChange={(v) => { setSelectedCategoryId(v); setSelectedIndicator(null); form.setFieldsValue({indicatorId:undefined,confirmedScore:undefined}); }}>
                            {mockCategories.map(c => <Option key={c.id} value={c.id}>{c.name}</Option>)}
                          </Select>
                        </Form.Item>
                      </Col>
                      <Col span={8}>
                        <Form.Item label="评价指标" name="indicatorId" rules={[{required:true,message:'请选择指标'}]}>
                          <Select placeholder="选择指标" onChange={onIndicatorChange}>
                            {filteredIndicators.map(ind => <Option key={ind.id} value={ind.id}>{ind.name} ({ind.direction===1?'加分':'扣分'})</Option>)}
                          </Select>
                        </Form.Item>
                      </Col>
                      <Col span={6}>
                        <Form.Item label="指标分值" extra={scoreHint}>
                          {isFixedType ? (
                            <InputNumber style={{width:'100%'}} disabled value={Math.abs(selectedIndicator.fixedScore)} />
                          ) : isRangeType ? (
                            <InputNumber style={{width:'100%'}} disabled value={null} placeholder={`${selectedIndicator.minScore}~${selectedIndicator.maxScore}`} />
                          ) : (
                            <InputNumber style={{width:'100%'}} disabled placeholder="选择指标后显示" />
                          )}
                        </Form.Item>
                      </Col>
                      <Col span={6}>
                        <Form.Item label="确认分值" name="confirmedScore"
                          rules={[{required:true,message:'请输入确认分值'}]}
                          extra={isRangeType ? <span style={{color:'#fa8c16'}}>请在范围内填写</span> : (isFixedType ? '已自动填入' : '')}>
                          <InputNumber style={{width:'100%'}} disabled={isFixedType}
                            min={selectedIndicator?.minScore||0} max={selectedIndicator?.maxScore||999}
                            placeholder={isRangeType ? `${selectedIndicator.minScore}~${selectedIndicator.maxScore}` : ''} />
                        </Form.Item>
                      </Col>
                      <Col span={8}>
                        <Form.Item label="事由说明" name="description">
                          <Input placeholder="选填，积分事由" allowClear />
                        </Form.Item>
                      </Col>
                      <Col span={4}>
                        <Form.Item label=" ">
                          <Button type="primary" icon={<PlusOutlined />} onClick={handleAddToList} block>添加</Button>
                        </Form.Item>
                      </Col>
                    </Row>
                  </Form>
                  {pendingList.length > 0 && (
                    <div style={{marginTop:8}}>
                      <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8}}>
                        <strong><FileTextOutlined style={{marginRight:6}} />待提交列表</strong>
                        <Space>
                          <span style={{color:'#8c8c8c'}}>合计: <span style={{color:totalScore>=0?'#52c41a':'#ff4d4f',fontWeight:700}}>{totalScore>0?'+':''}{totalScore} 分</span></span>
                          <Button danger size="small" onClick={()=>{setPendingList([]);message.info('已清空');}}>清空</Button>
                        </Space>
                      </div>
                      <Table columns={pendingColumns} dataSource={pendingList} rowKey="_id" size="small" pagination={false} scroll={{y:240}} />
                      <div style={{textAlign:'right', marginTop:16}}>
                        <Button type="primary" size="large" icon={<EyeOutlined />} onClick={()=>setPreviewVisible(true)}>
                          预览并提交 ({pendingList.length})
                        </Button>
                      </div>
                    </div>
                  )}
                  {pendingList.length === 0 && (
                    <div style={{textAlign:'center', padding:'24px 0', color:'#bfbfbf'}}>
                      <FileTextOutlined style={{fontSize:32, marginBottom:8}} />
                      <p>请在上方表单中填写后点击「添加」，支持不同人不同指标逐条添加</p>
                    </div>
                  )}
                </div>
              )},
              { key:'batch', label:<span><UploadOutlined style={{marginRight:4}} />批量导入</span>, children:(
                <div>
                  <Row gutter={16} align="middle" style={{marginBottom:16}}>
                    <Col span={6}><DatePicker picker="month" style={{width:'100%'}} placeholder="选择所属月份" /></Col>
                    <Col><Button icon={<DownloadOutlined />} onClick={()=>message.success('模板已下载')}>下载模板</Button></Col>
                    <Col><Upload showUploadList={false} beforeUpload={()=>{message.success('导入成功: 成功12条, 失败0条');return false;}}><Button type="primary" icon={<UploadOutlined />}>上传Excel</Button></Upload></Col>
                  </Row>
                  <div style={{background:'#fafafa', borderRadius:8, padding:32, textAlign:'center', border:'1px dashed #d9d9d9'}}>
                    <UploadOutlined style={{fontSize:48, color:'#bfbfbf'}} />
                    <p style={{color:'#8c8c8c', marginTop:12}}>请先下载模板，按格式填写后上传Excel文件</p>
                    <p style={{color:'#bfbfbf', fontSize:12}}>支持 .xlsx / .xls 格式，单次最多500条</p>
                  </div>
                </div>
              )},
            ]} />
          </div>
          <div className="card-box">
            <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12}}>
              <strong><FileTextOutlined style={{marginRight:6}} />最近录入记录</strong>
              <span style={{color:'#8c8c8c'}}>共 {mockPointRecords.length} 条</span>
            </div>
            <Table columns={recentColumns} dataSource={mockPointRecords} rowKey="id" size="small" pagination={{pageSize:5, showTotal:t=>`共 ${t} 条`}} />
          </div>
          <Modal open={previewVisible} title="提交预览" width={900} onCancel={()=>setPreviewVisible(false)}
            footer={[
              <Button key="cancel" onClick={()=>setPreviewVisible(false)}>返回修改</Button>,
              <Button key="submit" type="primary" onClick={handleConfirmSubmit}>确认提交</Button>,
            ]}>
            <div style={{marginBottom:16, background:'#f6ffed', border:'1px solid #b7eb8f', borderRadius:6, padding:'12px 16px'}}>
              <Row gutter={24}>
                <Col span={6}><span style={{color:'#8c8c8c'}}>所属月份:</span> <strong>{belongMonth ? belongMonth.format ? belongMonth.format('YYYY-MM') : String(belongMonth) : '-'}</strong></Col>
                <Col span={6}><span style={{color:'#8c8c8c'}}>录入条数:</span> <strong style={{color:'#1890ff'}}>{pendingList.length}</strong></Col>
                <Col span={6}><span style={{color:'#8c8c8c'}}>涉及员工:</span> <strong>{uniqueUsers.length} 人</strong></Col>
                <Col span={6}><span style={{color:'#8c8c8c'}}>分值合计:</span> <strong style={{color:totalScore>=0?'#52c41a':'#ff4d4f'}}>{totalScore>0?'+':''}{totalScore}</strong></Col>
              </Row>
            </div>
            <Table columns={[
              { title:'#', width:40, render:(_,__,i)=>i+1 },
              { title:'工号', dataIndex:'employeeNo', width:80 },
              { title:'姓名', dataIndex:'employeeName', width:70 },
              { title:'指标', dataIndex:'indicatorName', ellipsis:true },
              { title:'分类', dataIndex:'categoryName', width:90 },
              { title:'确认分值', dataIndex:'confirmedScore', width:90 },
              { title:'实际得分', dataIndex:'score', width:90, render:(v) => <Tag color={v>0?'green':'red'}>{v>0?'+':''}{v}</Tag> },
              { title:'类型', dataIndex:'pointStatus', width:70, render:(v) => <Tag color={v===1?'blue':'purple'}>{v===1?'过程分':'结果分'}</Tag> },
              { title:'事由', dataIndex:'description', width:150, ellipsis:true, render:(v)=>v||'-' },
            ]} dataSource={pendingList} rowKey="_id" size="small" pagination={false} scroll={{y:360}} />
          </Modal>
        </div>
      );
    }

    // ===== Audit List Page (积分审核) =====
    function AuditListPage() {
      const [filterAuditStatus, setFilterAuditStatus] = useState(undefined);
      const [filterPointStatus, setFilterPointStatus] = useState(undefined);
      const [keyword, setKeyword] = useState('');
      const [selectedRowKeys, setSelectedRowKeys] = useState([]);
      const [rejectVisible, setRejectVisible] = useState(false);
      const [rejectForm] = Form.useForm();

      const filteredData = useMemo(() => mockPointRecords.filter(r => {
        if (filterAuditStatus !== undefined && r.auditStatus !== filterAuditStatus) return false;
        if (filterPointStatus && r.pointStatus !== filterPointStatus) return false;
        if (keyword && !r.employeeName.includes(keyword) && !r.employeeNo.includes(keyword)) return false;
        return true;
      }), [filterAuditStatus, filterPointStatus, keyword]);

      const handleApprove = (id) => { message.success('审核通过'); };
      const handleBatchApprove = () => { message.success(`已批量通过 ${selectedRowKeys.length} 条`); setSelectedRowKeys([]); };

      const columns = [
        { title:'员工', width:100, render:(_,r) => <span>{r.employeeName}<br/><span style={{fontSize:12,color:'#8c8c8c'}}>{r.employeeNo}</span></span> },
        { title:'指标', dataIndex:'indicatorName', ellipsis:true },
        { title:'分类', dataIndex:'categoryName', width:90 },
        { title:'分值', dataIndex:'score', width:70, render:(v) => <Tag color={v>0?'green':'red'}>{v>0?'+':''}{v}</Tag> },
        { title:'类型', dataIndex:'pointStatus', width:75, render:(v) => <Tag color={v===1?'blue':'purple'}>{v===1?'过程分':'结果分'}</Tag> },
        { title:'事由', dataIndex:'description', width:180, ellipsis:true },
        { title:'登记人', dataIndex:'registrantName', width:80 },
        { title:'月份', dataIndex:'belongMonth', width:90 },
        { title:'状态', dataIndex:'auditStatus', width:80, render:(v) => <Tag color={auditColorMap[v]}>{auditStatusMap[v]}</Tag> },
        { title:'审核人', width:80, render:(_,r) => r.auditorName || '-' },
        { title:'审核时间', width:140, render:(_,r) => r.auditedAt || '-' },
        { title:'操作', width:130, fixed:'right', render:(_,r) => r.auditStatus === 0 ? (
          <Space size="small">
            <Popconfirm title="确认通过该条积分记录？" onConfirm={()=>handleApprove(r.id)}><a style={{color:'#52c41a'}}><CheckOutlined /> 通过</a></Popconfirm>
            <a style={{color:'#ff4d4f'}} onClick={()=>{setRejectVisible(true);rejectForm.resetFields();}}><CloseOutlined /> 驳回</a>
          </Space>
        ) : <span style={{color:'#bfbfbf'}}>已处理</span> },
      ];

      return (
        <div>
          <div className="page-header"><h2>积分审核</h2></div>
          <div className="card-box">
            <div className="filter-bar">
              <Input.Search placeholder="搜索工号/姓名" style={{width:200}} value={keyword} onChange={e=>setKeyword(e.target.value)} allowClear />
              <Select placeholder="审核状态" style={{width:120}} allowClear value={filterAuditStatus} onChange={setFilterAuditStatus}>
                <Option value={0}>待审核</Option><Option value={1}>已通过</Option><Option value={2}>已驳回</Option>
              </Select>
              <Select placeholder="积分类型" style={{width:120}} allowClear value={filterPointStatus} onChange={setFilterPointStatus}>
                <Option value={1}>过程分</Option><Option value={2}>结果分</Option>
              </Select>
              <DatePicker picker="month" placeholder="所属月份" style={{width:140}} />
            </div>
            <div className="table-actions">
              <Space>
                <Button type="primary" icon={<CheckOutlined />} disabled={!selectedRowKeys.length} onClick={handleBatchApprove}>
                  批量通过{selectedRowKeys.length ? ` (${selectedRowKeys.length})` : ''}
                </Button>
                <Button danger icon={<CloseOutlined />} disabled={!selectedRowKeys.length} onClick={()=>{setRejectVisible(true);rejectForm.resetFields();}}>
                  批量驳回{selectedRowKeys.length ? ` (${selectedRowKeys.length})` : ''}
                </Button>
              </Space>
              <span style={{color:'#8c8c8c'}}>共 {filteredData.length} 条</span>
            </div>
            <Table columns={columns} dataSource={filteredData} rowKey="id" size="middle" scroll={{x:1300}}
              pagination={{pageSize:10, showTotal:t=>`共 ${t} 条`}}
              rowSelection={{ selectedRowKeys, onChange:(keys) => setSelectedRowKeys(keys), getCheckboxProps:(r) => ({ disabled: r.auditStatus !== 0 }) }} />
          </div>
          <Modal open={rejectVisible} title="驳回原因" onCancel={()=>setRejectVisible(false)}
            onOk={()=>{message.success('已驳回');setRejectVisible(false);setSelectedRowKeys([]);}}>
            <Form form={rejectForm} layout="vertical" style={{marginTop:16}}>
              <Form.Item label="驳回原因" name="auditRemark" rules={[{required:true,message:'请输入驳回原因'}]}>
                <TextArea rows={3} placeholder="请输入驳回原因，将通知到录入人" />
              </Form.Item>
            </Form>
          </Modal>
        </div>
      );
    }

    // ===== Main App =====
    function App() {
      const [loggedIn, setLoggedIn] = useState(false);
      const [collapsed, setCollapsed] = useState(false);
      const [currentPage, setCurrentPage] = useState('dashboard');
      const [openKeys, setOpenKeys] = useState(['personnel','indicator','point-manage','ranking-display','system']);

      if (!loggedIn) return <LoginPage onLogin={() => setLoggedIn(true)} />;

      const menuItems = [
        { key:'dashboard', label:'工作台', icon: React.createElement(DashboardOutlined) },
        { key:'personnel', label:'人员管理', icon: React.createElement(TeamOutlined), children:[
          { key:'user-current', label:'员工管理', icon: React.createElement(UserOutlined) },
          { key:'user-history', label:'历史员工', icon: React.createElement(SolutionOutlined) },
          { key:'department', label:'部门管理', icon: React.createElement(ApartmentOutlined) },
        ]},
        { key:'ranking-list', label:'榜单配置', icon: React.createElement(OrderedListOutlined) },
        { key:'indicator', label:'指标库管理', icon: React.createElement(AppstoreOutlined), children:[
          { key:'indicator-category', label:'分类管理', icon: React.createElement(AppstoreOutlined) },
          { key:'indicator-list', label:'指标列表', icon: React.createElement(UnorderedListOutlined) },
        ]},
        { key:'point-manage', label:'积分管理', icon: React.createElement(FundOutlined), children:[
          { key:'point-entry', label:'积分录入', icon: React.createElement(FormOutlined) },
          { key:'process-maintain', label:'过程分维护', icon: React.createElement(SyncOutlined) },
          { key:'point-audit', label:'积分审核', icon: React.createElement(AuditOutlined) },
        ]},
        { key:'system', label:'系统管理', icon: React.createElement(SettingOutlined), children:[
          { key:'system-role', label:'角色管理', icon: React.createElement(SafetyCertificateOutlined) },
          { key:'system-config', label:'系统配置', icon: React.createElement(SettingOutlined) },
        ]},
      ];

      const breadcrumbMap = {
        'dashboard': ['工作台'],
        'user-current': ['人员管理', '员工管理'],
        'user-history': ['人员管理', '历史员工'],
        'department': ['人员管理', '部门管理'],
        'ranking-list': ['榜单配置'],
        'indicator-category': ['指标库管理', '分类管理'],
        'indicator-list': ['指标库管理', '指标列表'],
        'point-entry': ['积分管理', '积分录入'],
        'process-maintain': ['积分管理', '过程分维护'],
        'point-audit': ['积分管理', '积分审核'],
        'system-role': ['系统管理', '角色管理'],
        'system-config': ['系统管理', '系统配置'],
      };

      const pageTitleMap = {
        'dashboard':'工作台', 'user-current':'员工管理', 'user-history':'历史员工',
        'department':'部门管理', 'ranking-list':'榜单配置', 'indicator-category':'分类管理',
        'indicator-list':'指标列表', 'point-entry':'积分录入', 'process-maintain':'过程分维护',
        'point-audit':'积分审核', 'system-role':'角色管理', 'system-config':'系统配置',
      };

      const renderPage = () => {
        switch(currentPage) {
          case 'dashboard': return <DashboardPage />;
          case 'user-current': return <CurrentUserListPage />;
          case 'user-history': return <HistoryUserListPage />;
          case 'department': return <DepartmentManagePage />;
          case 'ranking-list': return <RankingListManagePage />;
          case 'indicator-category': return <CategoryManagePage />;
          case 'indicator-list': return <IndicatorListPage />;
          case 'point-entry': return <QuickEntryPage />;
          case 'process-maintain': return <ProcessMaintainPage />;
          case 'point-audit': return <AuditListPage />;
          case 'system-role': return <RoleManagePage />;
          case 'system-config': return <ConfigManagePage />;
          default: return <DashboardPage />;
        }
      };

      return (
        <ConfigProvider theme={{token:{colorPrimary:'#1890ff'}}}>
          <Layout style={{minHeight:'100vh'}}>
            <Sider width={220} collapsedWidth={64} collapsible collapsed={collapsed} onCollapse={setCollapsed}
              style={{background:'#001529', position:'fixed', left:0, top:0, bottom:0, zIndex:100, overflow:'auto'}}>
              <div className="sidebar-logo">
                <div style={{width:32,height:32,borderRadius:6,background:'linear-gradient(135deg,#667eea,#764ba2)',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontWeight:700,fontSize:16,flexShrink:0}}>积</div>
                {!collapsed && <span>积分系统</span>}
              </div>
              <Menu theme="dark" mode="inline" selectedKeys={[currentPage]} openKeys={collapsed?[]:openKeys}
                onOpenChange={setOpenKeys} onClick={({key}) => setCurrentPage(key)} items={menuItems} />
            </Sider>
            <Layout style={{marginLeft: collapsed?64:220, transition:'margin-left 0.2s'}}>
              <Header style={{background:'#fff', padding:'0 24px', display:'flex', alignItems:'center', justifyContent:'space-between',
                borderBottom:'1px solid #f0f0f0', position:'sticky', top:0, zIndex:99, height:64}}>
                <div style={{display:'flex', alignItems:'center', gap:16}}>
                  <Breadcrumb items={[{title:'首页'},...(breadcrumbMap[currentPage]||[]).map(t=>({title:t}))]} />
                </div>
                <Space size={16}>
                  <Avatar size="small" style={{backgroundColor:'#1890ff'}}><UserOutlined /></Avatar>
                  <span style={{color:'#262626', fontWeight:500}}>管理员</span>
                  <Tag color="blue">超级管理员</Tag>
                  <Button type="text" danger icon={<LogoutOutlined />} onClick={()=>{setLoggedIn(false);message.success('已退出登录');}}>退出</Button>
                </Space>
              </Header>
              <Content style={{padding:24, background:'#f0f2f5', minHeight:'calc(100vh - 64px)'}}>
                {renderPage()}
              </Content>
            </Layout>
          </Layout>
        </ConfigProvider>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
